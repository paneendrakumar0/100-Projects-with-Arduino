name: Code Formatting (clang-format)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  formatting-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: DoozyX/clang-format-lint-action@v0.16.2
      with:
        source: '.'
        extensions: 'ino,cpp,h,hpp'
        clangFormatVersion: 16
        style: file
